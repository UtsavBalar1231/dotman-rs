[package]
name = "dotman-rs"
version = "0.0.1"
edition = "2021"
license = "MIT"
readme = "README.md"
description = "Easily Manage dotfiles across machines"
categories = ["command-line-utilities"]
authors = ["Utsav Balar <utsavbalar1231@gmail.com>"]

[dependencies]
toml = "0.8"
sha1 = "0.10"
dirs = "5.0"
walkdir = "2.5"
rayon = "1.10"
thiserror = "2.0"
tempfile = "3.14.0"

[dependencies.serde]
version = "1.0"
features = ["derive"]

[dependencies.clap]
version = "4.5"
features = ["derive"]

[dependencies.digest]
version = "0.10"
features = ["alloc"]

