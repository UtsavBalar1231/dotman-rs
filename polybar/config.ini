;==========================================================
; gruvbox colorscheme
[colors]
; Dark/Black
dark =      #282828
black=      #1d2021
; Red
red=        #cc241d
red-alt=    #fb4934
; Green
green=      #98971a
green-alt=  #b8bb28
; Yellow
yellow =    #d79921
yellow-alt= #fabd2f
; Blue
blue=       #458588
blue-alt=   #83a598
; Purple
purple=     #b16286
purple-alt= #d3869b
; Aqua
aqua=       #689d6a
aqua-alt=   #8ec07c
; Orange
orange=     #d65d0e
orange-alt= #fe8019
; Cream
cream=      #ebdbb2
disabled =  #7C7C7C
transparent=#00000000

;==========================================================
[bar/example]
width = 100%
height = 18pt
radius = 0
dpi = 100
background = ${colors.dark}
foreground = ${colors.disabled}
line-size = 0pt
border-size = 0pt
border-color = ${colors.dark}
module-margin = 0
separator =.
separator-foreground = ${colors.transparent}
font-0 = "Iosevka Nerd Font:style=Regular:pixelsize=12;1"
font-1 = "Fira Code Nerd Font:style=Regular:pixelsize=12;1"
font-2 = "MaterialIcons-Regular:size=10"
font-3 = "NotoColorEmoji:pixelsize=12;1"

modules-left = xwindow date backlight
modules-center = polywins
modules-right = filesystem cpu temp memory pulseaudio powermenu
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
tray-position = right
tray-background =${colors.yellow-alt}
wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3
; override-redirect = true

;==========================================================
[module/kernel]
type=custom/script
format-prefix ="     "
format-prefix-foreground = ${colors.black}
format-prefix-background = ${colors.blue}
exec =uname -r
label-foreground= ${colors.black}
label-background= ${colors.blue-alt}
label-padding-left=2
label-padding-right=2
;==========================================================

;==========================================================
[module/xwindow]
type = internal/xwindow
format-prefix="    "
format-prefix-foreground=${colors.black}
format-prefix-background=${colors.purple}
label = %title:0:60:.....%
label-foreground = ${colors.black}
label-background = ${colors.purple-alt}
label-padding-left=2
label-padding-right=2

;==========================================================
[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
enable-scroll = true
format = <label>
format-prefix = "    "
format-prefix-foreground = ${colors.black}
format-prefix-background = ${colors.yellow}
label = %percentage:2%%
label-foreground = ${colors.black}
label-background = ${colors.yellow-alt}
label-padding-left=2
label-padding-right=2

;==========================================================
[module/filesystem]
type = internal/fs
interval = 2
mount-0 = /
format-mounted-prefix = "    "
format-mounted-prefix-foreground = ${colors.black}
format-mounted-prefix-background = ${colors.aqua}
label-mounted = %free%
label-unmounted =  %mountpoint% not mounted
label-mounted-foreground = ${colors.black}
label-mounted-background = ${colors.aqua-alt}
label-mounted-padding-left=2
label-mounted-padding-right=2

;==========================================================
[module/memory]
type = internal/memory
interval = 1
format-prefix = "    "
format-prefix-foreground = ${colors.black}
format-prefix-background = ${colors.orange}
label = %free%
label-foreground = ${colors.black}
label-background = ${colors.orange-alt}
label-padding-left=2
label-padding-right=2

;==========================================================
[module/cpu]
type = internal/cpu
interval = 1
format-prefix = "    "
format-prefix-foreground = ${colors.black}
format-prefix-background = ${colors.green}
label = %percentage%%
label-foreground = ${colors.black}
label-background = ${colors.green-alt}
label-padding-left=2
label-padding-right=2

;==========================================================
[module/temp]
type = custom/script
format-prefix = "      "
format-prefix-foreground = ${colors.black}
format-prefix-background = ${colors.red}
exec = sensors | awk '/^edge/ {print $2}'
interval = 1
label-foreground = ${colors.black}
label-background = ${colors.red-alt}
label-padding-left=2
label-padding-right=2

;==========================================================
[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "    "
format-volume-prefix-foreground = ${colors.black}
format-volume-prefix-background = ${colors.yellow}
format-volume = <label-volume>
label-volume = %percentage%%
label-volume-foreground= ${colors.black}
label-volume-background= ${colors.yellow-alt}
label-muted = muted
label-muted-foreground = ${colors.disabled}
label-volume-padding-left=2
label-volume-padding-right=2

;==========================================================
[module/date]
type = internal/date
format-prefix = "      "
format-prefix-foreground=${colors.black}
format-prefix-background = ${colors.yellow}
interval = 1
date =%H:%M:%S %d/%m/%Y
label =%date%
label-foreground = ${colors.black}
label-background = ${colors.yellow-alt}
label-padding-left=2
label-padding-right=2

;==========================================================
[settings]
screenchange-reload = true
pseudo-transparency = false
;==========================================================

[module/powermenu]
type = custom/menu
expand-left = true


format-padding-left = 1
format-padding-right = 1

label-open = "   "
label-open-foreground = ${colors.black}
label-open-background = ${colors.purple}
label-open-padding-left = 1
label-open-padding-right = 1

label-close =  Exit
label-close-foreground = ${colors.blue-alt}
label-close-background = ${colors.black}
label-close-padding-left = 1
label-close-padding-right = 1

label-separator = |
label-separator-foreground = ${colors.foreground}
label-separator-background = ${colors.background}
label-separator-padding-left = 1
label-separator-padding-right = 1

;Powermenu
menu-0-0 = "Rbt "
menu-0-0-exec = #powermenu.open.1
menu-0-0-foreground = ${colors.green-alt}

menu-0-1 = "POff"
menu-0-1-exec = #powermenu.open.2
menu-0-1-foreground = ${colors.red-alt}

menu-0-2 = "Hib  "
menu-0-2-exec = #powermenu.open.3
menu-0-2-foreground = ${colors.yellow-alt}

;Reboot
menu-1-0 = "Cancel"
menu-1-0-exec = #powermenu.open.0
menu-1-0-foreground = ${colors.blue-alt}
menu-1-1 = "Reboot"
menu-1-1-exec = systemctl reboot
menu-1-1-foreground = ${colors.green-alt}

;Shutdown
menu-2-0 = "POff"
menu-2-0-exec = systemctl poweroff
menu-2-0-foreground = ${colors.red-alt}
menu-2-1 = "Cancel "
menu-2-1-exec = #powermenu.open.0
menu-2-1-foreground = ${colors.blue-alt}

;Hibernate
menu-3-0 = "Hib  "
menu-3-0-exec = systemctl hibernate
menu-3-0-foreground = ${colors.yellow-alt}
menu-3-1 = "Cancel"
menu-3-1-exec = #powermenu.open.0
menu-3-1-foreground = ${colors.blue-alt}

;==========================================================
[module/polywins]
type = custom/script
exec = ~/.config/polybar/polywins.sh 2>/dev/null
format = <label>
label = %output%
label-padding = 1
label-foreground = ${colors.black}
label-background = ${colors.purple-alt}
tail = true

; vim:ft=dosini
