# gruvbox colorscheme
[colors]
background = #282828
background-alt = #3c3836
foreground = #ebdbb2
foreground-alt = #ebdbb2
primary = #458588
secondary = #689d6a
alert = #fb4934

[bar/main]
width = 100%
height = 2.5%
radius = 6.0
fixed-center = false
bottom = false
background = ${colors.background}
foreground = ${colors.foreground}
border-size = 0
line-size = 2
padding = 1
module-margin = 1
font-1 = "Iosevka Nerd Font:style=Regular:pixelsize=12;1"
font-2 = "Fira Code Nerd Font:style=Regular:pixelsize=12;1"
font-0 = "Material Design Icons:size=10"
font-3 = "NotoColorEmoji:pixelsize=12;1"
modules-left = date xwindow backlight pulseaudio

modules-center = polywins
modules-right = eth1 wlan memory cpu battery
tray-position = right
tray-padding = 2
tray-maxsize = 24

[global/wm]
margin-top = 0

