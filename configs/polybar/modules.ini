[module/tray]
type = internal/tray
format-margin = 8px
tray-spacing = 8px
tray-background = ${colors.background}

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
show-urgent = true
fuzzy-match = true

label-active = %name%
label-active-background = ${colors.background}
label-active-underline= ${colors.yellow}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title%

[module/filesystem]
type = internal/fs
fixed-values = true
mount-0 = /
label-mounted = َ°‹ٹ  %percentage_used%%
label-mounted-foreground = ${colors.foreground}
label-unmounted = َ±پŒ  %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}
warn-percentage = 75
label-warn = %percentage_used%%
label-warn-foreground = ${colors.alert}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "َ°“ƒ  "
format-volume-prefix-foreground = ${colors.foreground}
label-volume = %percentage%%
label-muted = َ°“„
label-muted-foreground = ${colors.disabled}
click-right = pavucontrol

[module/memory]
type = internal/memory
interval = 1
format-prefix = %{A1:kitty -1 -e btop&:}َ°چ›  %{A}
format-prefix-foreground = ${colors.foreground}
label = %percentage_used:2%%
label-warn-foreground = ${colors.alert}

[module/cpu]
type = internal/cpu
interval = 1
format-warn = <label-warn>
format-prefix = %{A1:kitty -1 -e btop&:}َ°‡… %{A}
format-prefix-foreground = ${colors.foreground}
label = %percentage:2%%
label-warn-foreground = ${colors.alert}

[module/wired-network]
type = internal/network
interface = enp7s0f1
accumulate-stats = true
unknown-as-up = true

format-connected-prefix = "َ°ˆ€  "
format-connected = %{A1:kitty -1 -e nmtui&:}<label-connected>%{A}
format-disconnected = %{A1:kitty -1 -e nmtui&:}<label-disconnected>%{A}

label-connected = %local_ip% %netspeed%
label-connected-foreground = ${colors.foreground}

label-disconnected = "َ°ˆ€ "
label-disconnected-foreground = ${colors.disabled}

[module/wireless-network]
type = internal/network
interface = wlan0
accumulate-stats = true
unknown-as-up = true

format-connected = %{A1:kitty -1 -e nmtui&:}<ramp-signal>  <label-connected>%{A}
format-disconnected = %{A1:kitty -1 -e nmtui&:}<label-disconnected>%{A}
format-packetloss = <animation-packetloss> <label-connected>

label-connected = %essid% %netspeed%
label-connected-foreground = ${colors.foreground}
label-disconnected = َ°¤­
label-disconnected-foreground = ${colors.disabled}

ramp-signal-0 = َ°¤¯
ramp-signal-1 = َ°¤ں
ramp-signal-2 = َ°¤¢
ramp-signal-3 = َ°¤¥
ramp-signal-4 = َ°¤¨
ramp-signal-foreground = ${colors.foreground}

animation-packetloss-0 = َ±›„
animation-packetloss-0-foreground = ${colors.alert}
animation-packetloss-1 = َ±›„
animation-packetloss-1-foreground = ${colors.alert}

[module/date]
type = internal/date
interval = 1
date-alt = %m/%d %H:%M
date = %Y/%m/%d %H:%M:%S
label = َ°ƒ­  %date%
label-foreground = ${colors.foreground}

[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
enable-scroll = true
format-prefix = "َ°ƒ‍  "
format-prefix-foreground = ${colors.foreground}
label = %percentage%%
label-foreground = ${colors.foreground}

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD

format-charging = <animation-charging>  <label-charging>
format-discharging = <ramp-capacity>  <label-discharging>
format-full = <ramp-capacity>  <label-full>
format-full-foreground = ${colors.green}
format-low-foreground = ${colors.alert}

