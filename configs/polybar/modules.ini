[module/bluetooth]
type = custom/script
click-left = ~/.config/polybar/scripts/bluetooth &
exec = ~/.config/polybar/scripts/bluetooth --status
format-padding = 1
format-background = ${colors.background}
format-foreground = ${colors.foreground}

[module/polywins]
type = custom/script
exec = ~/.config/polybar/scripts/polywins 2>/dev/null
format = <label>
label = "%output%"
label-padding = 0
tail = true
format-padding = 1
format-background = ${colors.background}
format-foreground = ${colors.foreground}

[module/application]
type = custom/text
click-left = rofi -show drun
format = "%{T2}َ°£‡%{T-}"
format-padding = 1
format-background = ${colors.background}
format-foreground = ${colors.foreground}

[module/powermenu]
type = custom/text
click-left = rofi -show p -modi p:'rofi-power-menu'
format = "%{T2}ï€‘ %{T-}"
format-padding = 1
format-background = ${colors.background}
format-foreground = ${colors.foreground}
