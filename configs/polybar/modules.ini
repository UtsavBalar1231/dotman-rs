[module/tray]
type = internal/tray
format-margin = 8px
tray-spacing = 8px
tray-position = right
tray-background = ${colors.background}

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
show-urgent = true
fuzzy-match = true

label-active = %name%
label-active-background = ${colors.background}
label-active-underline= ${colors.yellow}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title%

[module/filesystem]
type = internal/fs
fixed-values = true
mount-0 = /
label-mounted = ґ░ЛК  %percentage_used%%
label-mounted-foreground = ${colors.foreground}
label-unmounted = ґ▒БМ  %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}
warn-percentage = 75
label-warn = %percentage_used%%
label-warn-foreground = ${colors.alert}

[module/filesystem-dev]
type = internal/fs
fixed-values = true
mount-0 = /home/utsav/dev
label-mounted = ґ░ЛК  %percentage_used%%
label-mounted-foreground = ${colors.foreground}
label-unmounted = ґ▒БМ  %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}
warn-percentage = 75
label-warn = %percentage_used%%
label-warn-foreground = ${colors.alert}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "ґ░УГ  "
format-volume-prefix-foreground = ${colors.foreground}
label-volume = %percentage%%
label-muted = ґ░УД
label-muted-foreground = ${colors.disabled}
click-right = pavucontrol

[module/memory]
type = internal/memory
interval = 1
format-prefix = %{A1:kitty -1 -e btop&:}ґ░НЫ  %{A}
format-prefix-foreground = ${colors.foreground}
label = %percentage_used:2%%
label-warn = %{A1:kitty -1 -e btop&:}ю┐Е  %{A} %percentage_used:2%%
label-warn-foreground = ${colors.alert}

[module/cpu]
type = internal/cpu
interval = 1
format-warn = <label-warn>
format-prefix = %{A1:kitty -1 -e btop&:}ґ░ЗЕ %{A}
format-prefix-foreground = ${colors.foreground}
label = %percentage:2%%
label-warn = %{A1:kitty -1 -e btop&:}ґ░ЗЕ %{A} %percentage:2%%
label-warn-foreground = ${colors.alert}

[module/wired-network]
type = internal/network
interface = eth0
accumulate-stats = true
unknown-as-up = true

format-connected-prefix = "ґ░ИА  "
format-connected = %{A1:kitty -1 -e nmtui&:}<label-connected>%{A}
format-disconnected = %{A1:kitty -1 -e nmtui&:}<label-disconnected>%{A}

label-connected = %local_ip% %netspeed%
label-connected-foreground = ${colors.foreground}

label-disconnected = "ґ░ИА "
label-disconnected-foreground = ${colors.disabled}

[module/wireless-network]
type = internal/network
interface = wlan0
accumulate-stats = true
unknown-as-up = true

format-connected = %{A1:kitty -1 -e nmtui&:}<ramp-signal>  <label-connected>%{A}
format-disconnected = %{A1:kitty -1 -e nmtui&:}<label-disconnected>%{A}
format-packetloss = <animation-packetloss> <label-connected>

label-connected = %essid% %netspeed%
label-connected-foreground = ${colors.foreground}
label-disconnected = ґ░дн
label-disconnected-foreground = ${colors.disabled}

ramp-signal-0 = ґ░дп
ramp-signal-1 = ґ░дЯ
ramp-signal-2 = ґ░дв
ramp-signal-3 = ґ░де
ramp-signal-4 = ґ░ди
ramp-signal-foreground = ${colors.foreground}

animation-packetloss-0 = ґ▒ЫД
animation-packetloss-0-foreground = ${colors.alert}
animation-packetloss-1 = ґ▒ЫД
animation-packetloss-1-foreground = ${colors.alert}

[module/date]
type = internal/date
interval = 1
date-alt = %m/%d %H:%M
date = %Y/%m/%d %H:%M:%S
label = ґ░Гн  %date%
label-foreground = ${colors.foreground}

[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
enable-scroll = true
format-prefix = "ґ░ГЮ  "
format-prefix-foreground = ${colors.foreground}
label = %percentage%%
label-foreground = ${colors.foreground}

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD

format-charging = <animation-charging>  <label-charging>
format-discharging = <ramp-capacity>  <label-discharging>
format-full = <ramp-capacity>  <label-full>
format-full-foreground = ${colors.green}
format-low-foreground = ${colors.alert}

animation-charging-0 = ґ░вЯ
animation-charging-1 = ґ░вЬ
animation-charging-2 = ґ░вЬ
animation-charging-3 = ґ░ВЗ
animation-charging-4 = ґ░ВИ
animation-charging-5 = ґ░вЭ
animation-charging-6 = ґ░ВЙ
animation-charging-7 = ґ░вЮ
animation-charging-8 = ґ░ВК
animation-charging-9 = ґ░ВЛ
animation-charging-10 = ґ░ВЕ

animation-discharging-0 = ґ░Б╣
animation-discharging-1 = ґ░ВВ
animation-discharging-2 = ґ░ВБ
animation-discharging-3 = ґ░ВА
animation-discharging-4 = ґ░Б┐
animation-discharging-5 = ґ░Б╛
animation-discharging-6 = ґ░Б╜
animation-discharging-7 = ґ░Б╝
animation-discharging-8 = ґ░Б╗
animation-discharging-9 = ґ░Б║
animation-discharging-10 = ґ░ВО

animation-low-0 = ґ▒ГН
animation-low-1 = ґ░ВГ

ramp-capacity-0 = ґ░ВО
ramp-capacity-1 = ґ░Б║
ramp-capacity-2 = ґ░Б╗
ramp-capacity-3 = ґ░Б╝
ramp-capacity-4 = ґ░Б╜
ramp-capacity-5 = ґ░Б╛
ramp-capacity-6 = ґ░Б┐
ramp-capacity-7 = ґ░ВА
ramp-capacity-8 = ґ░ВБ
ramp-capacity-9 = ґ░ВВ
ramp-capacity-10 = ґ░Б╣

[module/bluetooth]
type = custom/script
click-left = ~/.config/polybar/scripts/bluetooth &
exec = ~/.config/polybar/scripts/bluetooth --status
format-padding = 1
format-background = ${colors.background}
format-foreground = ${colors.foreground}

[module/polywins]
type = custom/script
exec = ~/.config/polybar/scripts/polywins 2>/dev/null
format = <label>
label = "%output%"
label-padding = 0
tail = true
format-padding = 1
format-background = ${colors.background}
format-foreground = ${colors.foreground}

[module/application]
type = custom/text
click-left = rofi -show drun
format = "%{T2}ґ░гЗ%{T-}"
format-padding = 1
format-background = ${colors.background}
format-foreground = ${colors.foreground}

[module/powermenu]
type = custom/text
click-left = rofi -show p -modi p:'rofi-power-menu'
format = "%{T2}тП╝%{T-}"
format-padding = 1
format-background = ${colors.background}
format-foreground = ${colors.foreground}
