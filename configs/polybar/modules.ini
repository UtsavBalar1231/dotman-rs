[module/tray]
type = internal/tray
format-margin = 8px
tray-spacing = 8px
tray-position = right
tray-background = ${colors.background}

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
show-urgent = true
fuzzy-match = true

label-active = %name%
label-active-background = ${colors.background}
label-active-underline= ${colors.yellow}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title%

[module/filesystem]
type = internal/fs
fixed-values = true
mount-0 = /
label-mounted = /: у°‹Љ  %percentage_used%%
label-mounted-foreground = ${colors.foreground}
label-unmounted = /: у±ЃЊ  %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}
warn-percentage = 75
label-warn = %percentage_used%%
label-warn-foreground = ${colors.alert}

[module/filesystem-dev]
type = internal/fs
fixed-values = true
mount-0 = /home/utsav/dev
label-mounted = dev: у°‹Љ  %percentage_used%%
label-mounted-foreground = ${colors.foreground}
label-unmounted = dev: у±ЃЊ  %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}
warn-percentage = 75
label-warn = %percentage_used%%
label-warn-foreground = ${colors.alert}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "у°“ѓ  "
format-volume-prefix-foreground = ${colors.foreground}
label-volume = %percentage%%
label-muted = у°“„
label-muted-foreground = ${colors.disabled}
click-right = pavucontrol

[module/memory]
type = internal/memory
interval = 1
format-prefix = %{A1:kitty -1 -e btop&:}у°Ќ› %{A}
format-prefix-foreground = ${colors.foreground}
label = %percentage_used:2%%
label-warn = %{A1:kitty -1 -e btop&:}ої…  %{A} %percentage_used:2%%
label-warn-foreground = ${colors.alert}

[module/cpu]
type = internal/cpu
interval = 1
format-warn = <label-warn>
format-prefix = %{A1:kitty -1 -e btop&:}у°‡… %{A}
format-prefix-foreground = ${colors.foreground}
label = %percentage:2%%
label-warn = %{A1:kitty -1 -e btop&:}у°‡… %{A} %percentage:2%%
label-warn-foreground = ${colors.alert}

[module/wired-network]
type = internal/network
interface = eth0
accumulate-stats = true
unknown-as-up = true

format-connected-prefix = "у°€Ђ  "
format-connected = %{A1:kitty -1 -e nmtui&:}<label-connected>%{A}
format-disconnected = %{A1:kitty -1 -e nmtui&:}<label-disconnected>%{A}

label-connected = %local_ip% %netspeed%
label-connected-foreground = ${colors.foreground}

label-disconnected = "у°€Ђ "
label-disconnected-foreground = ${colors.disabled}

[module/wireless-network]
type = internal/network
interface = wlan0
accumulate-stats = true
unknown-as-up = true

format-connected = %{A1:kitty -1 -e nmtui&:}<ramp-signal>  <label-connected>%{A}
format-disconnected = %{A1:kitty -1 -e nmtui&:}<label-disconnected>%{A}
format-packetloss = <animation-packetloss> <label-connected>

label-connected = %essid% %netspeed%
label-connected-foreground = ${colors.foreground}
label-disconnected = у°¤­
label-disconnected-foreground = ${colors.disabled}

ramp-signal-0 = у°¤Ї
ramp-signal-1 = у°¤џ
ramp-signal-2 = у°¤ў
ramp-signal-3 = у°¤Ґ
ramp-signal-4 = у°¤Ё
ramp-signal-foreground = ${colors.foreground}

animation-packetloss-0 = у±›„
animation-packetloss-0-foreground = ${colors.alert}
animation-packetloss-1 = у±›„
animation-packetloss-1-foreground = ${colors.alert}

[module/date]
type = internal/date
interval = 1
date-alt = %m/%d %H:%M
date = %Y/%m/%d %H:%M:%S
label = у°ѓ­  %date%
label-foreground = ${colors.foreground}

[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
enable-scroll = true
format-prefix = "у°ѓћ  "
format-prefix-foreground = ${colors.foreground}
label = %percentage%%
label-foreground = ${colors.foreground}

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD

format-charging = <animation-charging>  <label-charging>
format-discharging = <ramp-capacity>  <label-discharging>
format-full = <ramp-capacity>  <label-full>
format-full-foreground = ${colors.green}
format-low-foreground = ${colors.alert}

animation-charging-0 = у°ўџ
animation-charging-1 = у°ўњ
animation-charging-2 = у°ўњ
animation-charging-3 = у°‚‡
animation-charging-4 = у°‚€
animation-charging-5 = у°ўќ
animation-charging-6 = у°‚‰
animation-charging-7 = у°ўћ
animation-charging-8 = у°‚Љ
animation-charging-9 = у°‚‹
animation-charging-10 = у°‚…

animation-discharging-0 = у°Ѓ№
animation-discharging-1 = у°‚‚
