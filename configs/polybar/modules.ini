[module/tray]
type = internal/tray
format-margin = 8px
tray-spacing = 8px
tray-position = right
tray-background = ${colors.background}

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
show-urgent = true
fuzzy-match = true

label-active = %name%
label-active-background = ${colors.background}
label-active-underline= ${colors.purple}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title%

[module/filesystem]
type = internal/fs
fixed-values = true
mount-0 = /
format-mounted-prefix = "/ ¾░ŗŖ  "
format-mounted-prefix-foreground = ${colors.purple}
label-mounted = %percentage_used%%
label-mounted-foreground = ${colors.foreground}
format-unmounted-prefix = "/ ¾▒üī  "
format-unmounted-prefix-foreground = ${colors.purple}
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}
warn-percentage = 75
label-warn = %percentage_used%%
label-warn-foreground = ${colors.alert}

[module/filesystem-dev]
type = internal/fs
fixed-values = true
mount-0 = /home/utsav/dev
format-mounted-prefix = "dev ¾░ŗŖ  "
format-mounted-prefix-foreground = ${colors.purple}
label-mounted = %percentage_used%%
label-mounted-foreground = ${colors.foreground}
format-unmounted-prefix = "dev ¾▒üī  "
format-unmounted-prefix-foreground = ${colors.purple}
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}
warn-percentage = 75
label-warn = %percentage_used%%
label-warn-foreground = ${colors.alert}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "¾░ōā  "
format-volume-prefix-foreground = ${colors.purple}
label-volume = %percentage%%
label-muted = ¾░ōä
label-muted-foreground = ${colors.disabled}
click-right = pavucontrol

[module/memory]
type = internal/memory
interval = 1
format-prefix = %{A1:kitty -1 -e btop&:}¾░Źø %{A}
format-prefix-foreground = ${colors.purple}
label = %percentage_used:2%%
label-warn = %{A1:kitty -1 -e btop&:}Ņ┐ģ  %{A} %percentage_used:2%%
label-warn-foreground = ${colors.alert}

[module/cpu]
type = internal/cpu
interval = 1
format-warn = <label-warn>
format-prefix = %{A1:kitty -1 -e btop&:}¾░ćģ %{A}
format-prefix-foreground = ${colors.purple}
label = %percentage:2%%
label-warn = %{A1:kitty -1 -e btop&:}¾░ćģ %{A} %percentage:2%%
label-warn-foreground = ${colors.alert}

[module/wired-network]
type = internal/network
interface = eth0
accumulate-stats = true
unknown-as-up = true

format-connected-prefix = "¾░łĆ  "
format-connected = %{A1:kitty -1 -e nmtui&:}<label-connected>%{A}
format-disconnected = %{A1:kitty -1 -e nmtui&:}<label-disconnected>%{A}

label-connected = %local_ip% %netspeed%
label-connected-foreground = ${colors.purple}

label-disconnected = "¾░łĆ "
label-disconnected-foreground = ${colors.disabled}

[module/wireless-network]
type = internal/network
interface = wlan0
accumulate-stats = true
unknown-as-up = true

format-connected = %{A1:kitty -1 -e nmtui&:}<ramp-signal>  <label-connected>%{A}
format-disconnected = %{A1:kitty -1 -e nmtui&:}<label-disconnected>%{A}
format-packetloss = <animation-packetloss> <label-connected>

label-connected = %essid% %netspeed%
label-connected-foreground = ${colors.foreground}
label-disconnected = ¾░żŁ
label-disconnected-foreground = ${colors.disabled}

ramp-signal-0 = ¾░ż»
ramp-signal-1 = ¾░ż¤
ramp-signal-2 = ¾░żó
ramp-signal-3 = ¾░żź
ramp-signal-4 = ¾░ż©
ramp-signal-foreground = ${colors.purple}

animation-packetloss-0 = ¾▒øä
animation-packetloss-0-foreground = ${colors.alert}
animation-packetloss-1 = ¾▒øä
animation-packetloss-1-foreground = ${colors.alert}

[module/date]
type = internal/date
interval = 1
date-alt = %m/%d %H:%M
date = %Y/%m/%d %H:%M:%S
format-prefix = "¾░āŁ  "
format-prefix-foreground = ${colors.purple}
label = %date%
label-foreground = ${colors.foreground}

[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
enable-scroll = true
format-prefix = "¾░ā×  "
format-prefix-foreground = ${colors.foreground}
label = %percentage%%
label-foreground = ${colors.foreground}

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD

format-charging = <animation-charging>  <label-charging>
format-discharging = <ramp-capacity>  <label-discharging>
format-full = <ramp-capacity>  <label-full>
format-full-foreground = ${colors.purple}
format-low-foreground = ${colors.alert}

