[module/bluetooth]
type = custom/script
click-left = ~/.config/polybar/scripts/bluetooth &
exec = ~/.config/polybar/scripts/bluetooth --status
format-padding = 1
format-background = ${colors.background}
format-foreground = ${colors.blue}

[module/polywins]
type = custom/script
exec = ~/.config/polybar/scripts/polywins 2>/dev/null
format = <label>
label = "%output%"
label-padding = 0
tail = true
format-padding = 1
format-background = ${colors.background}
format-foreground = ${colors.purple}

[module/application]
type = custom/text
click-left = ~/.config/rofi/launchers/type-5/launcher.sh
click-right = launcher_t5
format = "%{T2}¾░Żć%{T-}"
format-padding = 1
format-background = ${colors.background}
format-foreground = ${colors.purple}

[module/powermenu]
type = custom/text
click-left = ~/.config/rofi/powermenu/type-3/powermenu.sh
click-right = launcher_t3
format = "%{T2}ŌÅ╝%{T-}"
format-padding = 1
